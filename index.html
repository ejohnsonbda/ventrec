<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VentRec</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #ff5500;
      --accent-dim: rgba(255, 85, 0, 0.15);
      --red: #ff3333;
      --green: #22c55e;
      --radius: 10px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Logo ── */
    .logo {
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      position: relative;
      display: inline-block;
      background: linear-gradient(180deg, #fff700 0%, #ff8c00 30%, #ff3300 65%, #cc0000 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter:
        drop-shadow(0 1px 0 #cc4400)
        drop-shadow(0 2px 0 #882200)
        drop-shadow(0 4px 6px rgba(0,0,0,0.9));
      animation: fireGlow 2.8s ease-in-out infinite alternate, glitch 6s steps(1) infinite;
    }
    .logo::before, .logo::after {
      content: 'VentRec';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: inherit;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo::before { animation: glitchTop 6s steps(1) infinite; clip-path: polygon(0 0,100% 0,100% 40%,0 40%); }
    .logo::after  { animation: glitchBot 6s steps(1) infinite; clip-path: polygon(0 60%,100% 60%,100% 100%,0 100%); }

    @keyframes fireGlow {
      0%   { filter: drop-shadow(0 1px 0 #cc4400) drop-shadow(0 2px 0 #882200) drop-shadow(0 4px 6px rgba(0,0,0,.9)) drop-shadow(0 0 6px #ff6600) drop-shadow(0 0 14px #ff3300); }
      50%  { filter: drop-shadow(0 1px 0 #cc4400) drop-shadow(0 2px 0 #882200) drop-shadow(0 4px 6px rgba(0,0,0,.9)) drop-shadow(0 0 12px #ffaa00) drop-shadow(0 0 26px #ff6600) drop-shadow(0 0 40px #ff3300); }
      100% { filter: drop-shadow(0 1px 0 #cc4400) drop-shadow(0 2px 0 #882200) drop-shadow(0 4px 6px rgba(0,0,0,.9)) drop-shadow(0 0 10px #ffdd00) drop-shadow(0 0 22px #ff8800) drop-shadow(0 0 36px #ff4400); }
    }
    @keyframes glitch {
      0%,90%,100% { transform: translate(0,0) skew(0deg); }
      91% { transform: translate(-3px,1px) skew(-1deg); }
      92% { transform: translate(3px,-1px) skew(1deg); }
      93% { transform: translate(-2px,2px) skew(.5deg); }
      94% { transform: translate(2px,-2px) skew(-.5deg); }
      95% { transform: translate(0,0) skew(0deg); }
    }
    @keyframes glitchTop {
      0%,90%,100% { transform: translate(0,0); opacity:0; }
      91% { transform: translate(-4px,0); opacity:.7; }
      92% { transform: translate(4px,0); opacity:.5; }
      93% { transform: translate(0,0); opacity:0; }
    }
    @keyframes glitchBot {
      0%,90%,100% { transform: translate(0,0); opacity:0; }
      91% { transform: translate(4px,0); opacity:.6; }
      92% { transform: translate(-4px,0); opacity:.4; }
      93% { transform: translate(0,0); opacity:0; }
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 22px 24px 18px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    /* ── Waveform ── */
    .waveform-wrap {
      margin: 20px 24px 0;
      height: 72px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .waveform-idle {
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 1px;
    }
    canvas#waveCanvas {
      display: none;
      width: 100%;
      height: 100%;
    }

    /* ── Timer ── */
    .timer {
      text-align: center;
      font-size: 2.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      color: var(--accent);
      padding: 18px 0 4px;
      font-family: 'Courier New', monospace;
    }

    /* ── Status ── */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 22px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      display: none;
      animation: blink 1.4s infinite;
    }
    @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

    /* ── Controls ── */
    .controls {
      padding: 16px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
    .btn:not(:disabled):active { transform: scale(.97); }

    .btn-record {
      background: var(--accent);
      color: #fff;
    }
    .btn-record:not(:disabled):hover { opacity: .88; }

    .btn-stop {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-stop:not(:disabled):hover { border-color: var(--muted); }

    /* ── Duration chips ── */
    .chips {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 0 24px 4px;
    }
    .chip {
      padding: 4px 12px;
      font-size: 0.72rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .chip.active, .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Upload progress ── */
    .upload-bar-wrap {
      margin: 0 24px;
      display: none;
    }
    .upload-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .upload-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width .3s ease;
    }

    /* ── Toast ── */
    .toast {
      margin: 10px 24px 0;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.78rem;
      display: none;
      animation: fadeIn .3s;
    }
    .toast.ok  { background: rgba(34,197,94,.1); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
    .toast.err { background: rgba(255,51,51,.1); color: var(--red);   border: 1px solid rgba(255,51,51,.25); }
    .toast.inf { background: var(--accent-dim);  color: var(--accent); border: 1px solid rgba(255,85,0,.25); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

    /* ── Audio preview ── */
    .preview {
      margin: 12px 24px 0;
      display: none;
    }
    .preview audio {
      width: 100%;
      border-radius: 6px;
      accent-color: var(--accent);
    }

    /* ── Footer ── */
    .card-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">VentRec</div>
  </div>

  <!-- Waveform -->
  <div class="waveform-wrap">
    <span class="waveform-idle">— press record to begin —</span>
    <canvas id="waveCanvas"></canvas>
  </div>

  <!-- Timer -->
  <div class="timer" id="timer">00:00</div>

  <!-- Status -->
  <div class="status-row">
    <span class="dot" id="recDot"></span>
    <span id="statusText"></span>
  </div>

  <!-- Duration chips -->
  <div class="chips">
    <button class="chip active" data-mins="5">5 min</button>
    <button class="chip" data-mins="10">10 min</button>
    <button class="chip" data-mins="15">15 min</button>
    <button class="chip" data-mins="0">∞</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-record" id="btnRecord">Record</button>
    <button class="btn btn-stop"   id="btnStop" disabled>Stop &amp; Save</button>
  </div>

  <!-- Upload progress bar -->
  <div class="upload-bar-wrap" id="uploadBarWrap">
    <div class="upload-bar-track"><div class="upload-bar-fill" id="uploadBarFill"></div></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Audio preview -->
  <div class="preview" id="preview">
    <audio controls id="audioPreview"></audio>
  </div>

  <div class="card-footer">
    Your recordings are private and encrypted at rest.
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const SUPABASE_URL      = 'https://ogabwaekaeinyduntwmt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nYWJ3YWVrYWVpbnlkdW50d210Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzUxNjMsImV4cCI6MjA4OTg1MTE2M30.A_48JfQ5cfUeY9WLvHiOSSlW5mHjHQmTSLkd-Y0dhi4';
  const BUCKET            = 'recordings';
  const MAX_DURATION_DEFAULT = 5; // minutes

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── State ────────────────────────────────────────────────────────────────
  let mediaRecorder, audioChunks = [], audioBlob = null;
  let timerInterval, startTime, maxDurationMins = MAX_DURATION_DEFAULT;
  let audioCtx, analyser, animFrame;
  let sessionId = crypto.randomUUID();

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const btnRecord      = document.getElementById('btnRecord');
  const btnStop        = document.getElementById('btnStop');
  const timerEl        = document.getElementById('timer');
  const statusText     = document.getElementById('statusText');
  const recDot         = document.getElementById('recDot');
  const toast          = document.getElementById('toast');
  const preview        = document.getElementById('preview');
  const audioPreview   = document.getElementById('audioPreview');
  const waveCanvas     = document.getElementById('waveCanvas');
  const waveIdle       = document.querySelector('.waveform-idle');
  const uploadBarWrap  = document.getElementById('uploadBarWrap');
  const uploadBarFill  = document.getElementById('uploadBarFill');
  const chips          = document.querySelectorAll('.chip');

  // ── Duration chips ───────────────────────────────────────────────────────
  chips.forEach(c => {
    c.addEventListener('click', () => {
      chips.forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      maxDurationMins = parseInt(c.dataset.mins);
    });
  });

  // ── Helpers ──────────────────────────────────────────────────────────────
  function showToast(msg, type = 'inf') {
    toast.textContent = msg;
    toast.className = `toast ${type}`;
    toast.style.display = 'block';
    if (type === 'ok') setTimeout(() => { toast.style.display = 'none'; }, 5000);
  }

  function setStatus(text, showDot = false) {
    statusText.textContent = text;
    recDot.style.display = showDot ? 'inline-block' : 'none';
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    return `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
  }

  function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(2) + ' MB';
  }

  // ── Waveform ─────────────────────────────────────────────────────────────
  function startWaveform(stream) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    const src = audioCtx.createMediaStreamSource(stream);
    src.connect(analyser);

    const ctx2d = waveCanvas.getContext('2d');
    const buf = new Uint8Array(analyser.frequencyBinCount);

    waveIdle.style.display = 'none';
    waveCanvas.style.display = 'block';

    function draw() {
      animFrame = requestAnimationFrame(draw);
      analyser.getByteFrequencyData(buf);
      const w = waveCanvas.offsetWidth, h = waveCanvas.offsetHeight;
      waveCanvas.width = w; waveCanvas.height = h;
      ctx2d.clearRect(0, 0, w, h);
      const barW = w / buf.length * 2.5;
      let x = 0;
      buf.forEach(v => {
        const bh = (v / 255) * h;
        const alpha = 0.4 + (v / 255) * 0.6;
        ctx2d.fillStyle = `rgba(255,85,0,${alpha})`;
        ctx2d.fillRect(x, h - bh, barW - 1, bh);
        x += barW;
      });
    }
    draw();
  }

  function stopWaveform() {
    if (animFrame) cancelAnimationFrame(animFrame);
    if (audioCtx) audioCtx.close();
    waveCanvas.style.display = 'none';
    waveIdle.style.display = 'block';
    const ctx2d = waveCanvas.getContext('2d');
    ctx2d.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
  }

  // ── Record ───────────────────────────────────────────────────────────────
  btnRecord.addEventListener('click', async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: {
        sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true
      }});

      audioChunks = [];
      audioBlob   = null;
      preview.style.display = 'none';
      toast.style.display   = 'none';
      sessionId = crypto.randomUUID();

      // Pick best codec
      const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']
        .find(t => MediaRecorder.isTypeSupported(t)) || '';

      const options = mimeType ? { mimeType, audioBitsPerSecond: 32000 } : { audioBitsPerSecond: 32000 };
      mediaRecorder = new MediaRecorder(stream, options);

      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = handleStop;
      mediaRecorder.start(1000);

      startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        timerEl.textContent = formatTime(elapsed);
        if (maxDurationMins > 0 && elapsed >= maxDurationMins * 60000) {
          btnStop.click();
        }
      }, 500);

      startWaveform(stream);
      btnRecord.disabled = true;
      btnStop.disabled   = false;
      setStatus('Recording', true);

    } catch (err) {
      showToast('Microphone access denied.', 'err');
    }
  });

  // ── Stop ─────────────────────────────────────────────────────────────────
  btnStop.addEventListener('click', () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }
    clearInterval(timerInterval);
    stopWaveform();
    btnStop.disabled   = true;
    btnRecord.disabled = false;
    setStatus('Processing…');
  });

  // ── Handle stop / upload ─────────────────────────────────────────────────
  async function handleStop() {
    const duration = Date.now() - startTime;
    const mimeType = audioChunks[0]?.type || 'audio/webm';
    const ext = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'mp4' : 'webm';
    const fileName = `vent_${new Date().toISOString().replace(/[:.]/g,'-')}.${ext}`;
    const storagePath = `${sessionId}/${fileName}`;

    audioBlob = new Blob(audioChunks, { type: mimeType });
    audioPreview.src = URL.createObjectURL(audioBlob);
    preview.style.display = 'block';

    showToast('Saving recording…', 'inf');
    uploadBarWrap.style.display = 'block';
    uploadBarFill.style.width = '20%';

    try {
      // Upload to Supabase Storage
      const { data: storageData, error: storageErr } = await supabase.storage
        .from(BUCKET)
        .upload(storagePath, audioBlob, { contentType: mimeType, upsert: false });

      if (storageErr) throw storageErr;
      uploadBarFill.style.width = '70%';

      // Get signed URL (valid 1 year)
      const { data: urlData } = await supabase.storage
        .from(BUCKET)
        .createSignedUrl(storagePath, 31536000);

      uploadBarFill.style.width = '90%';

      // Log to recordings table
      await supabase.from('recordings').insert({
        session_id:   sessionId,
        file_name:    fileName,
        duration_ms:  Math.round(duration),
        file_size:    audioBlob.size,
        mime_type:    mimeType,
        storage_path: storagePath,
        storage_url:  urlData?.signedUrl || null,
        upload_status:'success'
      });

      uploadBarFill.style.width = '100%';
      setTimeout(() => { uploadBarWrap.style.display = 'none'; uploadBarFill.style.width = '0%'; }, 800);

      setStatus('');
      showToast(`Saved · ${formatTime(duration)} · ${formatBytes(audioBlob.size)}`, 'ok');

    } catch (err) {
      uploadBarWrap.style.display = 'none';
      setStatus('');
      showToast('Upload failed — recording saved locally only.', 'err');
      console.error(err);
    }
  }
</script>
</body>
</html>
